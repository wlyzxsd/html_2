<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="utf-8">
        <title>Трансформация и анимация</title>
        <link rel="stylesheet" href="CSS/style.css">
        <script src="http://d3js.org/d3.v7.min.js"></script>
        <script src="JavaScript/main.js"></script>
        <script src="JavaScript/image.js"></script>
        <script src="JavaScript/path.js"></script>
    </head>
    <body>
        <form id="setting">
            <div id="img_points">
                <p><b>Координаты рисунка</b><br>
                    <label for="cx">x: </label>
                    <input type="number" id="cx" name="cx" value="300" min="0">
                    <label for="cx_end">до: </label>
                    <input type="number" id="cx_end" name="cx_end" value="300" min="0"><br>

                    <label for="cy">y: </label>
                    <input type="number" id="cy" name="cy" value="300" min="0">
                    <label for="cy_end">y: </label>
                    <input type="number" id="cy_end" name="cy_end" value="300" min="0"><br>
                </p>
            </div>
            <div id="choose_path" style="display: none;">
                <p><b>Пути перемещения</b><br>
                    <select id="path_options">
                        <option value="1">Буквой "Г"</option>
                        <option value="2">По кругу</option>
                    </select>
                </p>
            </div>
            <div id="scale">
                <p><b>Масштаб</b><br>
                    <label for="x_size">по x: </label>
                    <input type="number" id="x_size" name="x_size" value="1" max="5" min="1">
                    <label for="x_size_end">до: </label>
                    <input type="number" id="x_size_end" name="x_size_end" value="1" max="5" min="1"><br>
                    
                    <label for="y_size">по y: </label>
                    <input type="number" id="y_size" name="y_size" value="2" max="5" min="1">
                    <label for="y_size_end">до: </label>
                    <input type="number" id="y_size_end" name="y_size_end" value="2" max="5" min="1"><br>
                </p>
            </div>
            <div id="rotate">
                <p><b>Поворт</b><br>
                    <label for="ang">угол: </label>
                    <input type="number" id="ang" name="ang" value="0" max="360" min="0">
                    <label for="ang_end">до: </label>
                    <input type="number" id="ang_end" name="ang_end" value="0" max="360" min="0">
                </p>
            </div>
            <p>
                <input type="button" value="Нарисовать">
                <input type="button" value="Очистить">
            </p>

            <p>
                <input type="checkbox" id="animation"> Включить анимацию?
                <select id="animation_options">
                    <option value="1">linear</option>
                    <option value="2">elastic</option>
                    <option value="3">bounce</option>
                </select>
            </p>
            <p id="path_block">
                <input type="checkbox" id="path"> Перемещение вдоль пути?
            </p>
            <p>
                <input type="button" value="Анимировать">
            </p>
        </form>

        <svg></svg>
    </body>
</html>
